<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ماشین حساب نیروهای امپراتوری</title>

<link rel="stylesheet" href="Style.css">

</head>


<body>


<div class="container">


    <header>

        <h1>⚔️ ماشین حساب نیروها ⚔️</h1>
        <h2>در حال به‌روزرسانی</h2>
        <p>
            تعداد نیرو را وارد کنید تا هزینه، قدرت و زمان محاسبه شود
        </p>

    </header>
    <div class="textInformation" onclick="toggleInfo()">
    i
</div>




    <div class="card">
        
        
        <label>
            🛡️ انتخاب نیرو
        </label>
        
        
        <select id="troop">
               <optgroup label="شمشیرزن‌">
            <option value="shamsherzan">🗡️ شمشیرزن</option>
            <option value="jonongar">😈 جنونگر</option>
            <option value="modafe">🛡️ مدافع</option>
            <option value="doshamsher">⚔️ دوشمشیره</option>
            <option value="negahban">🛡️ نگهبان</option>
            <option value="shovaliye">🐎 شوالیه</option>
            <option value="shekanshamsher">⚔️ شمشیرشکن</option>
            <option value="gard">👑 گارد سلطنتی</option>
            <option value="gladiator">⚔️ گلادیاتور</option>
        </optgroup>
        <optgroup label="کمانداران">
    <option value="tirandaz">🏹 تیرانداز</option>
    <option value="zobin">🏹 زوبین‌زن</option>
    <option value="oghab">🦅 عقاب</option>
</optgroup>

<optgroup label="حیوانات">
    <option value="khers">🐻 خرس</option>
    <option value="fil">🐘 فیل</option>
</optgroup>
            <optgroup label="غول‌ها"></optgroup>
            <option value="dastderaz">👑 دست‌دراز </option>
            <option value="jaloot">👹 جالوت</option>

            <option value="zanjir">👹 زنجیرشکن</option>
        </optgroup>
        <optgroup label="نیزه‌دار ">
            <option value="javidan">👑 جاویدان</option>
            
            <option value="hoplite">🛡️ هوپلیت</option>
        </optgroup>
     


<optgroup label="کولی">
    
    <option value="kuli">🦍 کولی</option>
<option value="Shirdel">🦁 شیردل</option>
<option value="mogul">👑 مغول</option>
<option value="aztak">🦖 آتزاك</option>
<option value="barbar">🪓 بربر</option>
</optgroup>
        </select>



        <label>
            🔢 تعداد
        </label>


        <input 
        type="number"
        id="count"
        value="1"
        min="1">



        <button onclick="calculate()">

            ⚔️ محاسبه

        </button>


    </div>



    <div id="result" class="result">

        نتیجه اینجا نمایش داده می‌شود

    </div>



</div>



<script src="Hamid.Js">
 
</script>


</body>

</html>
